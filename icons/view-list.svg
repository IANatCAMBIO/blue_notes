<?xml version="1.0" encoding="UTF-8"?>
<!-- List-view companion to view-grid.svg (hand-drawn for Orange Notes;
     public domain). Three 3px bars aligned to the grid's rows, so the
     two icons read as a matched pair. -->
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <g fill="#3f3f3f">
    <rect x="4.5" y="4.5"  width="15" height="3" rx="0.8"/>
    <rect x="4.5" y="10.5" width="15" height="3" rx="0.8"/>
    <rect x="4.5" y="16.5" width="15" height="3" rx="0.8"/>
  </g>
</svg>
